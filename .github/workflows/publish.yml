name: Deploy Lemmy

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  SSH_PORT: 2222
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/lemmy
  HOST: ${{ secrets.HOST }}
  LEMMY_HOSTNAME: ${{ secrets.LEMMY_HOSTNAME }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  PICTRS_API_KEY: ${{ secrets.PICTRS_API_KEY }}
  LEMMY_ADMIN_USERNAME: ${{ secrets.LEMMY_ADMIN_USERNAME }}
  LEMMY_ADMIN_PASSWORD: ${{ secrets.LEMMY_ADMIN_PASSWORD }}
  LEMMY_ADMIN_EMAIL: ${{ secrets.LEMMY_ADMIN_EMAIL }}
  LEMMY_SMTP_SERVER: ${{ vars.LEMMY_SMTP_SERVER }}
  LEMMY_SMTP_LOGIN: ${{ vars.LEMMY_SMTP_LOGIN }}
  LEMMY_SMTP_PASSWORD: ${{ secrets.LEMMY_SMTP_PASSWORD }}
  LEMMY_SMTP_FROM: ${{ vars.LEMMY_SMTP_FROM }}
  LEMMY_SMTP_TLS: ${{ vars.LEMMY_SMTP_TLS }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deploy env file
        run: |
          set -eu
          write_var() { printf "%s=%s\n" "$1" "$(printenv "$1")" >> .env; }
          > .env
          write_var POSTGRES_PASSWORD
          write_var PICTRS_API_KEY
          write_var LEMMY_HOSTNAME
          write_var LEMMY_ADMIN_USERNAME
          write_var LEMMY_ADMIN_PASSWORD
          write_var LEMMY_ADMIN_EMAIL
          write_var LEMMY_SMTP_SERVER
          write_var LEMMY_SMTP_LOGIN
          write_var LEMMY_SMTP_PASSWORD
          write_var LEMMY_SMTP_FROM
          write_var LEMMY_SMTP_TLS

      - name: Render Lemmy config
        run: |
          set -eu
          export TEMPLATE_PATH=./lemmy.hjson.template
          export OUTPUT_PATH=./lemmy.generated.hjson
          sh ./render-lemmy-config.sh

      - name: Configure SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.FORUM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Bootstrap remote host
        run: |
          set -eu

          ssh_remote() {
            ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "$@"
          }

          ssh_remote "export DEBIAN_FRONTEND=noninteractive; apt-get update; apt-get install -y docker.io docker-compose-v2; systemctl enable --now docker; mkdir -p ${DEPLOY_PATH}"

      - name: Upload deploy files
        run: |
          set -eu
          scp -P "${SSH_PORT}" docker-compose.yml .env lemmy.generated.hjson "${DEPLOY_USER}@${HOST}:${DEPLOY_PATH}/"

      - name: Deploy Docker Compose stack
        run: |
          set -eu
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${HOST}" "docker stack rm lemmy >/dev/null 2>&1 || true; sleep 10; cd ${DEPLOY_PATH} && docker compose pull && docker compose up -d --remove-orphans"

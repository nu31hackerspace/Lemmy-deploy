services:
  postgres:
    image: pgautoupgrade/pgautoupgrade:18-alpine
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lemmy
      POSTGRES_DB: lemmy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemmy -d lemmy -h 127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  pictrs:
    image: asonix/pictrs:0.5.17-pre.9
    hostname: pictrs
    restart: unless-stopped
    user: "991:991"
    environment:
      PICTRS__SERVER__API_KEY: ${PICTRS_API_KEY}
    command: ["/usr/local/bin/pict-rs", "run"]
    volumes:
      - pictrs_data:/mnt

  lemmy:
    image: dessalines/lemmy:0.19.18
    hostname: lemmy
    restart: unless-stopped
    ports:
      - "8536:8536"
    environment:
      LEMMY_CONFIG_LOCATION: /config/lemmy.hjson
    depends_on:
      postgres:
        condition: service_healthy
      pictrs:
        condition: service_started
    volumes:
      - ./lemmy.generated.hjson:/config/lemmy.hjson:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8536/api/v3/site >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  lemmy-ui:
    image: dessalines/lemmy-ui:0.19.18
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      LEMMY_UI_LEMMY_INTERNAL_HOST: lemmy:8536
      LEMMY_UI_LEMMY_EXTERNAL_HOST: ${LEMMY_HOSTNAME}
      LEMMY_UI_HTTPS: "true"
      LEMMY_UI_DEBUG: "false"
    depends_on:
      lemmy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  pictrs_data:
